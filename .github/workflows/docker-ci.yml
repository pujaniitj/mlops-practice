name: Full ML CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  mlops-pipeline:
    runs-on: ubuntu-latest

    env:
      WANDB_PROJECT: "Hindi Translation MLOps"
      WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}

      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_REPO_ID: "pujaniitj/hindi-en-demo-model"

      DOCKER_IMAGE: "pujaniitj/hindi-translator"

      UPLOAD_TO_HF: "true"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t $DOCKER_IMAGE .

      - name: Run Inference Pipeline
        run: |
          docker run --rm \
            -e WANDB_API_KEY="${WANDB_API_KEY}" \
            -e WANDB_PROJECT="${WANDB_PROJECT}" \
            -e HF_TOKEN="${HF_TOKEN}" \
            -e HF_REPO_ID="${HF_REPO_ID}" \
            -e UPLOAD_TO_HF="${UPLOAD_TO_HF}" \
            $DOCKER_IMAGE

      - name: Push Docker Image to Docker Hub
        run: |
          docker push $DOCKER_IMAGE

      - name: Workflow Completion Message
        run: |
          echo "======================================"
          echo "ML CI/CD Pipeline Executed Successfully"
          echo "Docker Hub Push Completed"
          echo "W&B Logging Completed"
          echo "Hugging Face Upload Completed"
          echo "======================================"